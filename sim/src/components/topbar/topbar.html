<header class="topbar" aria-label="Top navigation">
  <div class="topbar-brand">
    <span class="brand-dot"></span>
    <span class="brand-text">SIM Control</span>
  </div>

  <nav class="topbar-items" aria-label="System status">
    <button class="topbar-item topbar-item-settings" id="settings-button" type="button" aria-label="Settings and updates">
      <img src="/assets/icons/icons8-settings-50.gif" alt="Settings icon" />
      <span class="settings-copy">
        <span class="settings-label">Settings</span>
        <span class="settings-meta" id="settings-meta">About & updates</span>
      </span>
    </button>
    <div
      class="topbar-item topbar-item-status"
      aria-label="Internet status"
      id="internet-status-card"
    >
      <img src="/assets/icons/icons8-internet-50.gif" alt="Internet status icon" />
      <span class="status-meta">
        <span class="status-label">Internet Status</span>
        <span class="status-values">
          <span class="pill pill-pending" id="internet-link-state">Loading</span>
          <span class="pill pill-tech" id="internet-radio-tech">Unknown</span>
        </span>
      </span>
    </div>
    <div
      class="topbar-item topbar-item-provider"
      aria-label="Network provider"
      id="network-provider-card"
    >
      <img src="/assets/icons/icons8-gps-signal-50.gif" alt="Network provider icon" />
      <span class="provider-meta">
        <span class="provider-label">Network Provider</span>
        <span class="provider-name" id="network-provider-name">Loading...</span>
      </span>
    </div>
    <div
      class="topbar-item topbar-item-signal"
      aria-label="Network signal"
      id="network-signal-card"
    >
      <img id="network-signal-icon" src="/assets/icons/signal-none.png" alt="Network signal icon" />
      <span class="signal-meta">
        <span class="signal-label">Signal</span>
        <span class="signal-strength" id="network-signal-strength">Loading</span>
        <span class="signal-db" id="network-signal-db">-- dBm</span>
      </span>
    </div>
    <div class="topbar-item topbar-item-sim" aria-label="SIM information" id="sim-info-card">
      <img src="/assets/icons/network-provider.png" alt="SIM information icon" />
      <span class="sim-meta">
        <span class="sim-label">SIM</span>
        <span class="sim-value" id="sim-info-value">Loading...</span>
      </span>
    </div>
  </nav>
</header>
