<section id="ussd-tab" class="ussd-panel" style="display: none;">
  <div class="ussd-panel-header">
    <div>
      <p class="ussd-eyebrow">Interactive Service Codes</p>
      <h2>USSD Dialpad</h2>
    </div>
    <div class="ussd-header-status" id="ussd-session-state">Idle</div>
  </div>

  <div class="ussd-grid">
    <article class="ussd-card ussd-card-primary">
      <div class="ussd-card-header">
        <div>
          <p class="ussd-card-label">Dialer</p>
          <h3>Run a USSD request</h3>
        </div>
      </div>

      <label class="ussd-field">
        <span>Code</span>
        <input id="ussd-code-input" type="text" placeholder="*100#" autocomplete="off" />
      </label>

      <div class="ussd-shortcuts" id="ussd-shortcuts"></div>

      <div class="ussd-dialpad" id="ussd-dialpad">
        <button type="button" data-value="1">1</button>
        <button type="button" data-value="2">2</button>
        <button type="button" data-value="3">3</button>
        <button type="button" data-value="4">4</button>
        <button type="button" data-value="5">5</button>
        <button type="button" data-value="6">6</button>
        <button type="button" data-value="7">7</button>
        <button type="button" data-value="8">8</button>
        <button type="button" data-value="9">9</button>
        <button type="button" data-value="*">*</button>
        <button type="button" data-value="0">0</button>
        <button type="button" data-value="#">#</button>
      </div>

      <div class="ussd-actions">
        <button id="ussd-call-btn" class="ussd-btn ussd-btn-primary" type="button">Send</button>
        <button id="ussd-backspace-btn" class="ussd-btn ussd-btn-secondary" type="button">Delete</button>
        <button id="ussd-cancel-btn" class="ussd-btn ussd-btn-secondary" type="button">Cancel</button>
      </div>

      <p class="ussd-feedback" id="ussd-feedback">Ready</p>
    </article>

    <article class="ussd-card">
      <div class="ussd-card-header">
        <div>
          <p class="ussd-card-label">Session</p>
          <h3>Operator reply</h3>
        </div>
      </div>

      <div class="ussd-response" id="ussd-response-output">No active USSD response.</div>

      <label class="ussd-field">
        <span>Reply to menu</span>
        <input id="ussd-response-input" type="text" placeholder="1" autocomplete="off" />
      </label>

      <div class="ussd-actions">
        <button id="ussd-respond-btn" class="ussd-btn ussd-btn-primary" type="button">
          Reply
        </button>
      </div>

      <div class="ussd-meta">
        <div class="ussd-stat">
          <span>Prompt</span>
          <strong id="ussd-network-request">--</strong>
        </div>
        <div class="ussd-stat">
          <span>Notification</span>
          <strong id="ussd-network-notification">--</strong>
        </div>
      </div>
    </article>
  </div>
</section>
