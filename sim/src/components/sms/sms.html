<section id="sms-tab" class="sms-container" style="display: none;">
  <div class="sms-contacts-panel">
    <div class="sms-contacts-header">
      <h2>Messages</h2>
    </div>
    <div class="sms-contacts-list" id="sms-contacts-list">
      <!-- Contact items will be added dynamically -->
      <div class="sms-contact-item" data-contact-id="1">
        <div class="sms-contact-avatar">A</div>
        <div class="sms-contact-info">
          <div class="sms-contact-name">Alice</div>
          <div class="sms-contact-preview">Hey, how are you?</div>
        </div>
      </div>
      <div class="sms-contact-item" data-contact-id="2">
        <div class="sms-contact-avatar">B</div>
        <div class="sms-contact-info">
          <div class="sms-contact-name">Bob</div>
          <div class="sms-contact-preview">See you later</div>
        </div>
      </div>
    </div>
  </div>

  <div class="sms-chat-panel">
    <div class="sms-chat-header" id="sms-chat-header">
      <h2 id="sms-chat-title">Select a contact</h2>
      <div class="sms-chat-actions">
        <!-- <button class="sms-action-btn" aria-label="Call">📞</button>
        <button class="sms-action-btn" aria-label="Info">ℹ️</button> -->
      </div>
    </div>

    <div class="sms-messages-area" id="sms-messages-area">
      <div class="sms-placeholder">Select a contact to view messages</div>
    </div>

    <div class="sms-input-area">
      <input 
        type="text" 
        id="sms-input" 
        class="sms-message-input" 
        placeholder="Write a message..."
        disabled
      >
      <button class="sms-send-btn" id="sms-send-btn" aria-label="Send message" disabled>
        ➤
      </button>
    </div>
  </div>
</section>
