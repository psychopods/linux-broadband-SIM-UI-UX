name: Release Tauri Updater

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            fuse3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build AppImage and DEB
        working-directory: sim/src-tauri
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: cargo tauri build --bundles appimage,deb

      - name: Sign AppImage for updater
        working-directory: sim/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE_PATH="$(find target/release/bundle/appimage -type f -name '*.AppImage' | head -n 1)"
          if [[ -z "$APPIMAGE_PATH" ]]; then
            echo "No AppImage found"
            exit 1
          fi
          cargo tauri signer sign "$APPIMAGE_PATH"

      - name: Generate latest.json manifest
        working-directory: sim/src-tauri
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          APPIMAGE_PATH="$(find target/release/bundle/appimage -type f -name '*.AppImage' | head -n 1)"
          APPIMAGE_NAME="$(basename "$APPIMAGE_PATH")"
          SIG_PATH="${APPIMAGE_PATH}.sig"
          SIG_CONTENT="$(tr -d '\n' < "$SIG_PATH")"
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p target/release/updater
          cat > target/release/updater/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${GITHUB_REF_NAME}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "linux-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${APPIMAGE_NAME}"
              }
            }
          }
          EOF

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sim/src-tauri/target/release/bundle/appimage/*.AppImage
            sim/src-tauri/target/release/bundle/appimage/*.sig
            sim/src-tauri/target/release/bundle/deb/*.deb
            sim/src-tauri/target/release/updater/latest.json

  build-snap:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build snap
        uses: snapcore/action-build@v1

      - name: Upload snap to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.snap