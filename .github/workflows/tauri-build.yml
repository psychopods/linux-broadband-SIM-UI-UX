name: Build Tauri App

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            fuse3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build DEB and AppImage bundles
        working-directory: sim/src-tauri
        run: cargo tauri build --bundles deb,appimage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux-bundles
          path: |
            sim/src-tauri/target/release/bundle/deb/**
            sim/src-tauri/target/release/bundle/appimage/**
