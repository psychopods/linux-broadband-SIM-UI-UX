name: sim-broadband-manager
version: 1.1.102
summary: SIM Broadband Manager for modem status and network control
description: |
  Desktop application to manage broadband SIM modems, monitor connectivity,
  send SMS/USSD, make calls, and access SIM phonebook contacts using ModemManager.
base: core22
confinement: strict

apps:
  sim-broadband-manager:
    command: usr/local/bin/sim
    desktop: usr/share/applications/sim-broadband-manager.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback
      - home
      - network
      - network-control
      - dbus
    slots:
      - dbus

plugs:
  dbus:
    interface: dbus
    bus: system
    name: org.freedesktop.ModemManager1

parts:
  sim-broadband-manager:
    plugin: rust
    source: .
    source-type: git
    build-environment:
      - CARGO_HOME: $SNAPCRAFT_PART_INSTALL/cargo
    override-build: |
      cd sim/src-tauri
      cargo tauri build --bundles app
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/local/bin
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps
      
      # Copy the binary
      cp target/release/sim $SNAPCRAFT_PART_INSTALL/usr/local/bin/
      
      # Create desktop entry
      cat > $SNAPCRAFT_PART_INSTALL/usr/share/applications/sim-broadband-manager.desktop <<EOF
      [Desktop Entry]
      Type=Application
      Name=SIM Broadband Manager
      Comment=Monitor and manage broadband SIM modems
      Exec=sim-broadband-manager
      Icon=sim-broadband-manager
      Categories=Utility;Network;
      Terminal=false
      EOF
      
      # Copy icon (using 128x128 as fallback for 512x512)
      cp ../../../sim/src-tauri/icons/128x128.png \
         $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/sim-broadband-manager.png || true

    build-packages:
      - build-essential
      - libssl-dev
      - pkg-config
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - libappindicator3-dev
      - librsvg2-dev
      - patchelf
      - libsoup-3.0-dev
      - libglib2.0-dev
      - libjavascriptcoregtk-4.1-dev
      - libxdo-dev
      - git

    stage-packages:
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
      - libappindicator3-1
      - libc6
      - libssl3
      - libglib2.0-0
      - libatk1.0-0
      - libpango-1.0-0
      - libgdk-pixbuf2.0-0
      - libsoup-3.0-0
      - libjavascriptcoregtk-4.1-0
      - libxdo3
      - libdconf1
      - gsettings-desktop-schemas
      - xdg-user-dirs
      - shared-mime-info
      - fontconfig-config
      - fonts-dejavu-core
